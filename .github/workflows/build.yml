name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Generate Keystore
        run: |
          keytool -genkey -v             -keystore app/dualtools.keystore             -alias dualtools             -keyalg RSA             -keysize 2048             -validity 36500             -storepass dualtools             -keypass dualtools             -dname "CN=DualTools, OU=Dev, O=DualTools, L=BJ, ST=BJ, C=CN"

      - name: Sign APK (v1+v2+v3)
        run: |
          apksigner sign             --ks app/dualtools.keystore             --ks-pass pass:dualtools             --ks-key-alias dualtools             --key-pass pass:dualtools             app/build/outputs/apk/release/app-release.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "DualTools v${{ github.run_number }}"
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DualTools-APK
          path: app/build/outputs/apk/release/*.apk
