name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
      - name: Build Release APK
        run: gradle assembleRelease -x lint
      - name: Generate Keystore
        run: keytool -genkey -v -keystore dualtools.keystore -alias dualtools -keyalg RSA -keysize 2048 -validity 36500 -storepass dualtools -keypass dualtools -dname "CN=DualTools"
      - name: Sign APK
        run: jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore dualtools.keystore -storepass dualtools -keypass dualtools app/build/outputs/apk/release/app-release.apk dualtools
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: DualTools v${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DualTools-APK
          path: app/build/outputs/apk/release/*.apk
