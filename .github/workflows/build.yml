name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Generate Keystore
        run: |
          keytool -genkey -v             -keystore dualtools.keystore             -alias dualtools             -keyalg RSA -keysize 2048 -validity 36500             -storepass dualtools -keypass dualtools             -dname "CN=DualTools"

      - name: Setup Android SDK Build Tools
        run: |
          mkdir -p $HOME/android-sdk
          curl -fsSL -o /tmp/cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q /tmp/cmdline.zip -d /tmp
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv /tmp/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "y" | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "build-tools;34.0.0" 2>&1 | tail -5
          echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Sign APK (v1+v2)
        run: |
          apksigner sign --v1-signing-enabled true --v2-signing-enabled true             --ks dualtools.keystore --ks-pass pass:dualtools             --ks-key-alias dualtools --key-pass pass:dualtools             app/build/outputs/apk/release/app-release.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: DualTools v${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DualTools-APK
          path: app/build/outputs/apk/release/*.apk
