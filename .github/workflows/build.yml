name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Generate Keystore
        run: |
          keytool -genkey -v             -keystore dualtools.keystore             -alias dualtools             -keyalg RSA             -keysize 2048             -validity 36500             -storepass dualtools             -keypass dualtools             -dname "CN=DualTools"

      - name: Download uber-apk-signer
        run: |
          curl -fsSL -o uber-apk-signer.jar             https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar
          ls -la uber-apk-signer.jar

      - name: Sign APK (v1+v2+v3)
        run: |
          java -jar uber-apk-signer.jar             --apks app/build/outputs/apk/release/app-release.apk             --ks dualtools.keystore             --ksAlias dualtools             --ksPass dualtools             --ksKeyPass dualtools             --allowResign

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: DualTools v${{ github.run_number }}
          files: app/build/outputs/apk/release/*-aligned-debugSigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DualTools-APK
          path: app/build/outputs/apk/release/*-aligned-debugSigned.apk
